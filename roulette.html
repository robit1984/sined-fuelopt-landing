<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SINED · Рулетка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* ========== СЛАЙДЕР НА ФОНЕ ========== */
        .background-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .background-slider img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .background-slider img.active {
            opacity: 0.35;
        }
        .background-slider::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 30%, #0a0a0f 90%);
        }

        /* Точки слайдера */
        .slider-dots {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 12px;
        }
        .slider-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: 1.5px solid #00d4ff;
            cursor: pointer;
            transition: 0.3s;
        }
        .slider-dot.active {
            background: #00d4ff;
            box-shadow: 0 0 15px #00d4ff;
            transform: scale(1.3);
        }

        /* ========== ИГРОВОЙ КОНТЕЙНЕР ========== */
        .game-container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 100%;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid #00d4ff;
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
            text-align: center;
        }
        h1 {
            color: #00d4ff;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 20px;
        }
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5), inset 0 0 20px rgba(0,0,0,0.5);
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff6b6b;
            filter: drop-shadow(0 0 10px #ff6b6b);
            z-index: 10;
        }
        .result-box {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .result-label {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .result-value {
            color: #00ff88;
            font-size: 56px;
            font-weight: 800;
            text-shadow: 0 0 30px #00ff88;
            line-height: 1.2;
        }
        .result-value small {
            font-size: 24px;
            color: #00d4ff;
        }
        .btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            color: #0a0a0f;
            font-size: 24px;
            font-weight: 700;
            padding: 18px 30px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 0 30px #00d4ff;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:disabled {
            opacity: 0.5;
            box-shadow: none;
            transform: none;
        }
        .history {
            color: #8899aa;
            font-size: 14px;
            margin-top: 20px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00d4ff;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- СЛАЙДЕР С ТРЕМЯ ФОТО -->
    <div class="background-slider">
        <img src="https://drive.google.com/thumbnail?id=1rA1LGG4kWtFRg5k6T&sz=w1920" alt="Фото 1" class="active">
        <img src="https://drive.google.com/thumbnail?id=1cmRvkdl3jeYlysuAS&sz=w1920" alt="Фото 2">
        <img src="https://drive.google.com/thumbnail?id=1cmRvkdl3jeYlysuAS&sz=w1920" alt="Фото 3">
    </div>

    <!-- ТОЧКИ СЛАЙДЕРА -->
    <div class="slider-dots">
        <div class="slider-dot active" data-index="0"></div>
        <div class="slider-dot" data-index="1"></div>
        <div class="slider-dot" data-index="2"></div>
    </div>

    <div class="game-container">
        <h1>SINED</h1>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        
        <div class="result-box">
            <div class="result-label">ВЫИГРЫШ</div>
            <div class="result-value" id="resultDisplay">0 <small>л</small></div>
        </div>
        
        <button class="btn" id="spinBtn">КРУТИТЬ</button>
        
        <div class="history" id="historyDisplay"></div>
        
        <a href="https://robit1984.github.io/sined-fuelopt-landing/" class="back-link">← На главную</a>
    </div>
    
    <script>
        // ========== СЛАЙДЕР ==========
        const images = document.querySelectorAll('.background-slider img');
        const dots = document.querySelectorAll('.slider-dot');
        let currentIndex = 0;
        let sliderInterval;

        function showSlide(index) {
            images.forEach((img, i) => img.classList.toggle('active', i === index));
            dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
            currentIndex = index;
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % images.length;
            showSlide(currentIndex);
        }

        sliderInterval = setInterval(nextSlide, 4000);

        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => {
                clearInterval(sliderInterval);
                showSlide(i);
                sliderInterval = setInterval(nextSlide, 4000);
            });
        });

        // ========== РУЛЕТКА ==========
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const resultDisplay = document.getElementById('resultDisplay');
        const historyDisplay = document.getElementById('historyDisplay');
        const spinBtn = document.getElementById('spinBtn');
        
        const SEGMENTS = [
            { label: '100 л', value: 100, color: '#00d4ff' },
            { label: '50 л', value: 50, color: '#6c5ce7' },
            { label: '20 л', value: 20, color: '#00b894' },
            { label: '10 л', value: 10, color: '#fdcb6e' },
            { label: '5 л', value: 5, color: '#e17055' },
            { label: '0 л', value: 0, color: '#636e72' },
            { label: 'ДЖЕКПОТ', value: 1000, color: '#ff6b6b' },
            { label: '50 л', value: 50, color: '#a29bfe' }
        ];
        
        const PI = Math.PI;
        const TAU = 2 * PI;
        const SEGMENT_ANGLE = TAU / SEGMENTS.length;
        
        let rotation = 0;
        let spinning = false;
        let history = [];
        
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < SEGMENTS.length; i++) {
                const segment = SEGMENTS[i];
                const startAngle = i * SEGMENT_ANGLE + rotation;
                const endAngle = startAngle + SEGMENT_ANGLE;
                
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, startAngle, endAngle);
                ctx.closePath();
                
                ctx.fillStyle = segment.color;
                ctx.fill();
                ctx.strokeStyle = '#0a0a0f';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(startAngle + SEGMENT_ANGLE / 2);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 18px "Segoe UI", Roboto, sans-serif';
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 8;
                ctx.fillText(segment.label, 130, 0);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.arc(200, 200, 40, 0, TAU);
            ctx.fillStyle = '#0a0a0f';
            ctx.fill();
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.font = 'bold 20px "Segoe UI"';
            ctx.fillStyle = '#00d4ff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SINED', 200, 200);
        }
        
        function getWinner() {
            const angle = (TAU - (rotation % TAU) + TAU / 2) % TAU;
            const index = Math.floor(angle / SEGMENT_ANGLE);
            return SEGMENTS[index];
        }
        
        function spin() {
            if (spinning) return;
            spinning = true;
            spinBtn.disabled = true;
            
            const spins = 8 + Math.random() * 6;
            const targetRotation = rotation + spins * TAU;
            const duration = 3000;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                rotation = (rotation + (targetRotation - rotation) * easeOut) % TAU;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    spinning = false;
                    spinBtn.disabled = false;
                    
                    const winner = getWinner();
                    resultDisplay.innerHTML = `${winner.value} <small>л</small>`;
                    
                    history.unshift({ value: winner.value, time: new Date().toLocaleTimeString() });
                    if (history.length > 5) history.pop();
                    
                    let historyText = 'Последние выигрыши: ';
                    history.forEach(h => { historyText += `${h.value}л `; });
                    historyDisplay.textContent = historyText;
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        drawWheel();
        spinBtn.addEventListener('click', spin);
    </script>
</body>
</html>
