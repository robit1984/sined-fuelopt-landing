<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SINED · Рулетка</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/winwheel@1.2.0/Winwheel.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif;}
        body{min-height:100vh;background:#0a0a0f;display:flex;align-items:center;justify-content:center;padding:10px;position:relative;overflow-x:hidden;}
        #canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
        .game-card{position:relative;z-index:10;max-width:450px;width:100%;background:rgba(10,15,25,0.85);backdrop-filter:blur(12px);border:1px solid #00d4ff;border-radius:36px;padding:25px 18px;box-shadow:0 0 50px rgba(0,212,255,0.3);text-align:center;}
        h1{color:#00d4ff;font-size:36px;font-weight:800;letter-spacing:6px;text-shadow:0 0 20px #00d4ff;margin-bottom:15px;}
        .wheel-wrapper{position:relative;width:min(320px,80vw);height:min(320px,80vw);margin:0 auto 20px;}
        canvas{width:100%!important;height:100%!important;display:block;border-radius:50%;box-shadow:0 0 40px #00d4ff80,inset 0 0 20px #000;}
        .pointer{position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:32px solid #ff6b6b;filter:drop-shadow(0 0 8px #ff6b6b);z-index:10;}
        .prize-panel{background:rgba(0,0,0,0.4);border:1.5px solid #00d4ff;border-radius:20px;padding:15px;margin:15px 0;}
        .prize-label{color:#aaa;font-size:14px;}
        .prize-value{color:#00ffaa;font-size:48px;font-weight:800;text-shadow:0 0 25px #00ffaa;}
        .prize-value small{font-size:20px;color:#00d4ff;}
        .spin-btn{background:linear-gradient(145deg,#00d4ff,#0088cc);border:none;color:#0a0a0f;font-size:22px;font-weight:700;padding:16px;border-radius:60px;width:100%;cursor:pointer;box-shadow:0 0 30px #00d4ff;transition:0.2s;border:1px solid #ffffff30;letter-spacing:2px;}
        .spin-btn:active{transform:scale(0.97);}
        .spin-btn:disabled{opacity:0.5;box-shadow:none;}
        .history{color:#88a;font-size:13px;margin-top:15px;}
        .back-link{display:inline-block;margin-top:12px;color:#00d4ff;text-decoration:none;font-size:14px;}
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="game-card">
        <h1>SINED</h1>
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        <div class="prize-panel">
            <div class="prize-label">ВЫИГРЫШ</div>
            <div class="prize-value" id="prizeDisplay">0 <small>л</small></div>
        </div>
        <button class="spin-btn" id="spinButton">КРУТИТЬ</button>
        <div class="history" id="historyDisplay"></div>
        <a href="https://robit1984.github.io/sined-fuelopt-landing/" class="back-link">← На главную</a>
    </div>
    <script>
        // ========== 3D-ФОН ==========
        const scene = new THREE.Scene();scene.background = new THREE.Color(0x0a0a0f);
        const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);camera.position.set(2,1.5,7);
        const renderer = new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const light = new THREE.DirectionalLight(0xffeedd,1);light.position.set(5,8,5);scene.add(light);
        scene.add(new THREE.AmbientLight(0x404060));
        const stars=new THREE.BufferGeometry();const pos=new Float32Array(2000*3);
        for(let i=0;i<2000*3;i+=3){pos[i]=(Math.random()-0.5)*200;pos[i+1]=(Math.random()-0.5)*200;pos[i+2]=(Math.random()-0.5)*200;}
        stars.setAttribute('position',new THREE.BufferAttribute(pos,3));
        scene.add(new THREE.Points(stars,new THREE.PointsMaterial({color:0xffffff,size:0.15})));
        function addDerrick(x,z,s,c){const g=new THREE.Group();const m=new THREE.MeshStandardMaterial({color:c});const leg=new THREE.BoxGeometry(0.15,2.5,0.15);[[-0.6,1.25,-0.4,0.1],[0.6,1.25,-0.4,-0.1],[-0.5,1.25,0.5,0.1],[0.5,1.25,0.5,-0.1]].forEach(p=>{const l=new THREE.Mesh(leg,m);l.position.set(p[0],p[1],p[2]);l.rotation.z=p[3];g.add(l);});g.position.set(x,-2.2,z);g.scale.set(s,s,s);scene.add(g);}
        addDerrick(-2.5,-1,1,0x00d4ff);addDerrick(2.5,0,0.8,0x6c5ce7);
        function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}animate();
        window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

        // ========== РУЛЕТКА (Winwheel) ==========
        const canvas=document.getElementById('wheelCanvas');
        const prizeDisplay=document.getElementById('prizeDisplay');
        const historyDiv=document.getElementById('historyDisplay');
        const spinBtn=document.getElementById('spinButton');
        
        const SEGMENTS=[
            {text:'100 л',fillStyle:'#00d4ff',textFontSize:18,value:100},
            {text:'50 л',fillStyle:'#6c5ce7',textFontSize:18,value:50},
            {text:'20 л',fillStyle:'#00b894',textFontSize:18,value:20},
            {text:'10 л',fillStyle:'#fdcb6e',textFontSize:18,value:10},
            {text:'5 л',fillStyle:'#e17055',textFontSize:18,value:5},
            {text:'0 л',fillStyle:'#636e72',textFontSize:18,value:0},
            {text:'50 л',fillStyle:'#a29bfe',textFontSize:18,value:50},
            {text:'100 л',fillStyle:'#00d4ff',textFontSize:18,value:100}
        ];
        
        const wheel = new Winwheel({
            canvasId:'wheelCanvas',numSegments:SEGMENTS.length,outerRadius:190,innerRadius:45,
            textFontFamily:'Segoe UI',textFontWeight:'bold',textFillStyle:'#ffffff',textStrokeStyle:'#000',textLineWidth:2,
            segments:SEGMENTS,
            animation:{type:'spinToStop',duration:5,spins:8,callbackFinished:showResult}
        });
        
        let history=[];
        function showResult(){
            const winner=wheel.getIndicatedSegment();
            const jackpot=Math.random()<0.001;
            let val=winner.value;
            if(jackpot){val=10000;prizeDisplay.innerHTML=`🏆 ${val} <small>л</small>`;}
            else prizeDisplay.innerHTML=`${val} <small>л</small>`;
            history.unshift({val,jackpot});if(history.length>5)history.pop();
            historyDiv.textContent='Последние: '+history.map(h=>h.jackpot?'🏆'+h.val+'л':h.val+'л').join(' ');
            spinBtn.disabled=false;
        }
        
        spinBtn.addEventListener('click',()=>{spinBtn.disabled=true;wheel.startAnimation();});
        wheel.draw();
    </script>
</body>
</html>
