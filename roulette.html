<!-- force refresh 2026-04-21 15:00 --><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 РУЛЕТКА SINED</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0a0f;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #roulette-container {
            text-align: center;
            color: white;
            max-width: 500px;
            width: 100%;
        }
        .wheel-wrapper {
            position: relative;
            width: min(85vw, 450px);
            height: min(85vw, 450px);
            margin: 20px auto;
        }
        #wheelCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            background: #111;
            border-radius: 50%;
            box-shadow: 0 0 30px #00d4ff;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #ffd700;
            filter: drop-shadow(0 0 20px gold);
            z-index: 20;
        }
        .spin-btn {
            background: #00d4ff;
            border: none;
            color: #0a0a0f;
            font-weight: bold;
            font-size: 28px;
            padding: 18px 50px;
            border-radius: 60px;
            margin: 20px 0;
            cursor: pointer;
            box-shadow: 0 0 40px #00d4ff;
        }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            font-size: 32px;
            font-weight: bold;
            min-height: 50px;
            color: #00ffaa;
        }
        h1 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
</head>
<body>
    <div id="roulette-container">
        <h1>🎰 SINED ROULETTE</h1>
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
        </div>
        <button class="spin-btn" id="spinButton">🎰 КРУТИТЬ</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        
        const sectors = [
            { label: '100 Л', color: '#00d4ff', prize: 100 },
            { label: '50 Л', color: '#6c5ce7', prize: 50 },
            { label: '20 Л', color: '#ff6b6b', prize: 20 },
            { label: '10 Л', color: '#ffd93d', prize: 10 },
            { label: '5 Л', color: '#6bcb77', prize: 5 },
            { label: '0 Л', color: '#4d4d4d', prize: 0 },
        ];
        
        let rotation = 0;
        let spinning = false;
        
        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 15;
            const angleStep = (Math.PI * 2) / sectors.length;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            sectors.forEach((sector, i) => {
                const startAngle = i * angleStep + rotation;
                const endAngle = startAngle + angleStep;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                
                ctx.fillStyle = sector.color;
                ctx.fill();
                ctx.strokeStyle = '#0a0a0f';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + angleStep / 2);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 22px Segoe UI';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 8;
                ctx.fillText(sector.label, radius * 0.7, 0);
                ctx.restore();
            });
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#0a0a0f';
            ctx.fill();
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.font = 'bold 20px Segoe UI';
            ctx.fillStyle = '#00d4ff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SINED', centerX, centerY);
        }
        function getPrize() {
    const angleStep = (Math.PI * 2) / sectors.length;
    const normalizedRotation = (rotation % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
    const pointerAngle = (Math.PI * 1.5 - normalizedRotation + Math.PI * 2) % (Math.PI * 2);
    const index = Math.floor(pointerAngle / angleStep);
    return sectors[index].prize;
}
        
        
        function spin() {
            if (spinning) return;
            
            const btn = document.getElementById('spinButton');
            spinning = true;
            btn.disabled = true;
            document.getElementById('result').textContent = '';
            
            const spins = 5 + Math.floor(Math.random() * 5);
            const targetRotation = rotation + (Math.PI * 2 * spins) + Math.random() * Math.PI * 2;
            const duration = 2000;
            const startTime = Date.now();
            const startRotation = rotation;
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                rotation = startRotation + (targetRotation - startRotation) * easeOut;
                
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    spinning = false;
                    btn.disabled = false;
                    
                    const prize = getPrize();
                    const resultDiv = document.getElementById('result');
                    
                    if (prize > 0) {
                        resultDiv.textContent = `🎉 ВЫИГРЫШ: +${prize} ЛИТРОВ!`;
                        confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                    } else {
                        resultDiv.textContent = '😢 ПУСТО';
                    }
                }
            }
            
            animate();
        }
        
        drawWheel();
        document.getElementById('spinButton').addEventListener('click', spin);
    </script>
</body>
</html>
