<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SINED · Рулетка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .game-container {
            max-width: 500px;
            width: 100%;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #00d4ff;
            border-radius: 40px;
            padding: 30px 20px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
            text-align: center;
        }
        h1 {
            color: #00d4ff;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 20px;
        }
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5), inset 0 0 20px rgba(0,0,0,0.5);
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff6b6b;
            filter: drop-shadow(0 0 10px #ff6b6b);
            z-index: 10;
        }
        .result-box {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00d4ff;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .result-label {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .result-value {
            color: #00ff88;
            font-size: 56px;
            font-weight: 800;
            text-shadow: 0 0 30px #00ff88;
            line-height: 1.2;
        }
        .result-value small {
            font-size: 24px;
            color: #00d4ff;
        }
        .btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            color: #0a0a0f;
            font-size: 24px;
            font-weight: 700;
            padding: 18px 30px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 0 30px #00d4ff;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
            letter-spacing: 2px;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:disabled {
            opacity: 0.5;
            box-shadow: none;
            transform: none;
        }
        .history {
            color: #8899aa;
            font-size: 14px;
            margin-top: 20px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #00d4ff;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>SINED</h1>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
        
        <div class="result-box">
            <div class="result-label">ВЫИГРЫШ</div>
            <div class="result-value" id="resultDisplay">0 <small>л</small></div>
        </div>
        
        <button class="btn" id="spinBtn">КРУТИТЬ</button>
        
        <div class="history" id="historyDisplay"></div>
        
        <a href="https://robit1984.github.io/sined-fuelopt-landing/" class="back-link">← На главную</a>
    </div>
    
    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const resultDisplay = document.getElementById('resultDisplay');
        const historyDisplay = document.getElementById('historyDisplay');
        const spinBtn = document.getElementById('spinBtn');
        
        // Призы
        const SEGMENTS = [
            { label: '100 л', value: 100, color: '#00d4ff' },
            { label: '50 л', value: 50, color: '#6c5ce7' },
            { label: '20 л', value: 20, color: '#00b894' },
            { label: '10 л', value: 10, color: '#fdcb6e' },
            { label: '5 л', value: 5, color: '#e17055' },
            { label: '0 л', value: 0, color: '#636e72' },
            { label: 'ДЖЕКПОТ', value: 1000, color: '#ff6b6b' },
            { label: '50 л', value: 50, color: '#a29bfe' }
        ];
        
        const PI = Math.PI;
        const TAU = 2 * PI;
        const SEGMENT_ANGLE = TAU / SEGMENTS.length;
        
        let rotation = 0;
        let spinning = false;
        let history = [];
        
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < SEGMENTS.length; i++) {
                const segment = SEGMENTS[i];
                const startAngle = i * SEGMENT_ANGLE + rotation;
                const endAngle = startAngle + SEGMENT_ANGLE;
                
                // Рисуем сектор
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, startAngle, endAngle);
                ctx.closePath();
                
                ctx.fillStyle = segment.color;
                ctx.fill();
                ctx.strokeStyle = '#0a0a0f';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Текст
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(startAngle + SEGMENT_ANGLE / 2);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = 'bold 18px "Segoe UI", Roboto, sans-serif';
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 8;
                ctx.fillText(segment.label, 130, 0);
                ctx.restore();
            }
            
            // Центральный круг
            ctx.beginPath();
            ctx.arc(200, 200, 40, 0, TAU);
            ctx.fillStyle = '#0a0a0f';
            ctx.fill();
            ctx.strokeStyle = '#00d4ff';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.font = 'bold 20px "Segoe UI"';
            ctx.fillStyle = '#00d4ff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SINED', 200, 200);
        }
        
        function getWinner() {
            const angle = (TAU - (rotation % TAU) + TAU / 2) % TAU;
            const index = Math.floor(angle / SEGMENT_ANGLE);
            return SEGMENTS[index];
        }
        
        function spin() {
            if (spinning) return;
            spinning = true;
            spinBtn.disabled = true;
            
            const spins = 8 + Math.random() * 6;
            const targetRotation = rotation + spins * TAU;
            const duration = 3000;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                
                rotation = (rotation + (targetRotation - rotation) * easeOut) % TAU;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    spinning = false;
                    spinBtn.disabled = false;
                    
                    const winner = getWinner();
                    resultDisplay.innerHTML = `${winner.value} <small>л</small>`;
                    
                    history.unshift({ value: winner.value, time: new Date().toLocaleTimeString() });
                    if (history.length > 5) history.pop();
                    
                    let historyText = 'Последние выигрыши: ';
                    history.forEach(h => { historyText += `${h.value}л `; });
                    historyDisplay.textContent = historyText;
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        drawWheel();
        spinBtn.addEventListener('click', spin);
    </script>
</body>
</html>
